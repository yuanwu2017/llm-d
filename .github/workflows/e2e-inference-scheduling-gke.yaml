name: GKE optimized baseline Test

on:
  # Runs with a PR comment /run-gke-optimized-baseline
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 10 * * *'  # 3AM PST (10:00 UTC)
  workflow_dispatch:
    inputs:
      pr_or_branch:
        description: 'Pull-request number or branch name to test'
        required: true
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  deploy_and_validate:
    if: >
      github.repository == 'llm-d/llm-d' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, '/run-gke-optimized-baseline')
        ) &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ))
    name: Test on ${{ matrix.accelerator.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        accelerator:
          - name: GPU
            helmfile_env: gke
            gke_cluster_name: llm-d-e2e-us-east5
            gke_cluster_zone: us-east5
            timeout: 25m
          - name: TPU
            helmfile_env: gke_tpu_v6
            gke_cluster_name: llm-d-e2e-us-east5 # TODO: Update cluster once v7x is supported. v7x is only available in us-central1
            gke_cluster_zone: us-east5
            timeout: 35m

    env:
      GCP_PROJECT_ID: llm-d-scale
      NAMESPACE: llm-d-optimized-baseline
      GATEWAY: gke-l7-regional-external-managed
      GATEWAY_TYPE: gke
      PR_OR_BRANCH: ${{ github.event.inputs.pr_or_branch || github.event.issue.number || github.event.number || 'main' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TPU_JOB: tpu-job

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Determine if pr_or_branch is a PR number
        id: check_pr
        env:
          PR_OR_BRANCH: ${{ github.event.inputs.pr_or_branch }}
        shell: bash
        run: |
          echo "PR_OR_BRANCH=${PR_OR_BRANCH:-main}" >> "$GITHUB_ENV"
          if [[ "$PR_OR_BRANCH" =~ ^[0-9]+$ ]]; then
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" = "pull_request" ]]; then
            echo "PR_OR_BRANCH=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and checkout PR
        if: steps.check_pr.outputs.is_pr == 'true'
        run: |
          git fetch origin pull/"$PR_OR_BRANCH"/head:pr-"$PR_OR_BRANCH"
          git checkout pr-"$PR_OR_BRANCH"

      - name: Checkout branch
        if: steps.check_pr.outputs.is_pr == 'false'
        run: git checkout "$PR_OR_BRANCH"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud CLI and kubectl
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: 'kubectl,gke-gcloud-auth-plugin,alpha'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ matrix.accelerator.gke_cluster_name }}" --zone "${{ matrix.accelerator.gke_cluster_zone }}"

      - name: Install prerequisites
        run: |
          ./helpers/client-setup/install-deps.sh | tee ~/install-deps.log

      - name: Create namespace
        run: |
          kubectl create namespace "${NAMESPACE}" || echo "Namespace already exists"

      - name: Create llm-d-hf-token secret
        run: |
          kubectl create secret generic llm-d-hf-token \
            --from-literal="HF_TOKEN=${{ secrets.HF_TOKEN }}" \
            --namespace "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Request TPU v6E
        if: matrix.accelerator.name == 'TPU'
        run: |
          cat <<EOF | kubectl apply -n "${NAMESPACE}" -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${TPU_JOB}
          spec:
            parallelism: 2
            completions: 2
            template:
              spec:
                nodeSelector:
                  cloud.google.com/gke-flex-start: "true"
                  cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
                  cloud.google.com/gke-tpu-topology: 2x4
                containers:
                - name: tpu-container
                  image: gcr.io/k8s-staging-perf-tests/sleep:latest
                  args: ["3600s"]
                  resources:
                    requests:
                      google.com/tpu: "8"
                    limits:
                      google.com/tpu: "8"
                restartPolicy: OnFailure
          EOF

          kubectl wait pod \
            --for=condition=Ready \
            -l job-name=${TPU_JOB} \
            -n "${NAMESPACE}" \
            --timeout=45m

          # Release the chips so test can use them
          kubectl delete job ${TPU_JOB} -n "${NAMESPACE}"

      - name: Deploy model service and GIE with Helmfile
        run: |
          cd guides/optimized-baseline
          helmfile apply -e ${{ matrix.accelerator.helmfile_env }} \
            --set "gateway.service.type=LoadBalancer" \
            --skip-schema-validation \
            | tee ~/optimized-baseline-deployment.log
          echo "---------------------------------------" >> ~/optimized-baseline-deployment.log

      - name: Deploy HTTPRoute
        run: |
          cd guides/optimized-baseline
          echo "Deploying HTTPRoute..."
          kubectl apply -f httproute.gke.yaml -n ${NAMESPACE} | tee ~/optimized-baseline-deployment.log
          echo "---------------------------------------" >> ~/optimized-baseline-deployment.log

      - name: Upload helm get all
        run: |
          for release_name in infra-optimized-baseline gaie-optimized-baseline ms-optimized-baseline; do
            bash .github/scripts/e2e/helm-get-all.sh \
              ~/optimized-baseline-deployment.log \
              "$release_name" \
              "$NAMESPACE"
          done

      - name: Wait for all pods to be ready
        run: |
          kubectl wait pod \
            --for=condition=Ready \
            --all \
            -n "${NAMESPACE}" \
            --timeout=${{ matrix.accelerator.timeout }}
          echo "✅ All pods are ready."
          kubectl get pods -n "${NAMESPACE}"

      - name: Wait for gateway to be ready
        run: |
          GATEWAY_NAME=infra-optimized-baseline-inference-gateway
          kubectl wait gateway/${GATEWAY_NAME} \
            --for=condition=Programmed=True \
            -n "${NAMESPACE}" \
            --timeout=300s
          echo "✅ Gateway is ready."
          kubectl get gateway -n "${NAMESPACE}"

      - name: Show deployment status
        run: |
          echo "=== Deployments ==="
          kubectl get deployments -n "${NAMESPACE}"
          echo ""
          echo "=== Replica Sets ==="
          kubectl get replicasets -n "${NAMESPACE}"
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n "${NAMESPACE}"
          echo ""
          echo "=== Services ==="
          kubectl get svc -n "${NAMESPACE}"
          echo ""
          echo "=== Helm releases ==="
          helm list -n "${NAMESPACE}" || true
          echo ""
          echo "=== Inference Pools ==="
          kubectl get inferencepools -n "${NAMESPACE}" || true
          echo ""
          echo "=== HTTPRoutes ==="
          kubectl get httproutes -n "${NAMESPACE}" || true
          echo ""
          echo "=== Gateway ==="
          kubectl get Gateway -n "${NAMESPACE}" || true
          echo ""

      - name: Verify installation and run inference tests
        run: |
          cd .github/scripts/e2e
          ./e2e-validate.sh -n "${NAMESPACE}" -v

      - name: Collect and upload Kubernetes pod logs
        if: always()
        run: |
          mkdir -p pod-logs-optimized-baseline
          cd pod-logs-optimized-baseline
          echo "Fetching ${NAMESPACE} pods log..."
          kubectl get pods -n "${NAMESPACE}" --no-headers -o custom-columns=":metadata.name" \
          | xargs -I{} sh -c 'kubectl logs --all-containers=true -n "${NAMESPACE}" {} > "{}.log" 2>&1'
          echo "Fetching ${NAMESPACE} pods descriptions..."
          kubectl get pods -n "${NAMESPACE}" --no-headers -o custom-columns=":metadata.name" \
          | xargs -I{} sh -c 'kubectl describe pod -n "${NAMESPACE}" {} > "{}-describe.log" 2>&1'
          mv ~/optimized-baseline-deployment.log . || true
          mv ~/install-deps.log . || true

      - name: Upload pod logs as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: llmd-pod-logs-optimized-baseline-${{ matrix.accelerator.name }}
          path: pod-logs-optimized-baseline

      - name: Send Google Chat notification on failure
        if: failure()
        uses: SimonScholz/google-chat-action@3b3519e5102dba8aa5046fd711c4b553586409bb
        with:
          webhookUrl: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          jobStatus: ${{ job.status }}
          title: '${{ github.workflow }} - ${{ matrix.accelerator.name }}'

      - name: Cleanup deployment
        if: always()
        run: |
          cd guides/optimized-baseline
          helmfile destroy -e ${{ matrix.accelerator.helmfile_env }}
          kubectl delete -f httproute.gke.yaml -n ${NAMESPACE}
          kubectl delete job ${TPU_JOB} -n "${NAMESPACE}" --ignore-not-found