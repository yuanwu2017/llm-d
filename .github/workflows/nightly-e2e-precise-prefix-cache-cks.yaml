name: Nightly - Precise Prefix Cache E2E (CKS)

# Nightly regression test for the precise-prefix-cache-aware guide on
# CoreWeave (CKS). Deploys via kustomize + the standalone chart with the UDS
# tokenizer post-renderer; validates with e2e-validate.sh against the
# scheduler EPP service (gateway_host).

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily (staggered)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-precise-prefix-cache-cks
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-cks.yaml@main
    with:
      guide_name: precise-prefix-cache-aware
      namespace: llm-d-nightly-prefix-cache-cks
      gateway_host: 'precise-prefix-cache-aware-epp'
      custom_deploy_script: |
        kubectl apply -k guides/precise-prefix-cache-aware/modelserver/gpu/vllm -n ${NAMESPACE}
        helm install precise-prefix-cache-aware \
          oci://registry.k8s.io/gateway-api-inference-extension/charts/standalone \
          -f guides/recipes/scheduler/base.values.yaml \
          -f guides/precise-prefix-cache-aware/scheduler/precise-prefix-cache-aware.values.yaml \
          --post-renderer ./guides/precise-prefix-cache-aware/scheduler/patches/uds-tokenizer/post-renderer.sh \
          -n ${NAMESPACE} --version v1.4.0
      accelerator_type: H100
      required_gpus: 2
      recommended_gpus: 4
      pod_wait_timeout: '30m'
      pod_readiness_delay: 180
      image_override: 'ghcr.io/llm-d/llm-d-cuda-dev:latest'
      allow_gpu_preemption: true
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
