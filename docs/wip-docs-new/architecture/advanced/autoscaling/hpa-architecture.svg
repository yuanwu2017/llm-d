<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 315" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="680" height="315" rx="4" fill="#ffffff" stroke="#d9d2e9" stroke-width="2.5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">HPA Architecture</text>

  <!-- ── Row 1: Inference path ───────────────────────────────────────── -->

  <!-- Client -->
  <rect x="20" y="55" width="88" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="64" y="80" text-anchor="middle" font-size="12" fill="#000000">Client</text>

  <!-- Client → EPP -->
  <line x1="108" y1="75" x2="175" y2="75" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EPP -->
  <rect x="177" y="55" width="138" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="246" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">EPP</text>
  <text x="246" y="88" text-anchor="middle" font-size="10" fill="#666666">Flow Control</text>

  <!-- EPP → Pool -->
  <line x1="315" y1="75" x2="400" y2="75" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="357" y="67" text-anchor="middle" font-size="9.5" fill="#444444">inference requests</text>

  <!-- Model Server Pool -->
  <rect x="402" y="55" width="258" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="531" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Model Server Pool</text>
  <text x="531" y="88" text-anchor="middle" font-size="10" fill="#666666">vLLM</text>

  <!-- ── Vertical: EPP → Prometheus (metrics) ───────────────────────── -->
  <line x1="246" y1="95" x2="246" y2="218" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="259" y="155" font-size="9.5" fill="#444444">scrapes</text>
  <text x="259" y="168" font-size="9.5" fill="#444444">metrics</text>

  <!-- ── Row 2: Metrics pipeline ────────────────────────────────────── -->

  <!-- Prometheus -->
  <rect x="172" y="220" width="120" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="232" y="245" text-anchor="middle" font-size="12" fill="#000000">Prometheus</text>

  <!-- Prometheus → Adapter -->
  <line x1="292" y1="240" x2="334" y2="240" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Prometheus Adapter -->
  <rect x="336" y="220" width="160" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="416" y="238" text-anchor="middle" font-size="11" fill="#000000">Prometheus Adapter</text>
  <text x="416" y="253" text-anchor="middle" font-size="9" fill="#666666">External Metrics API</text>

  <!-- Adapter → HPA -->
  <line x1="496" y1="240" x2="530" y2="240" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- HPA -->
  <rect x="532" y="220" width="78" height="40" rx="3" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1"/>
  <text x="571" y="245" text-anchor="middle" font-size="12" fill="#000000">HPA</text>

  <!-- ── Vertical: HPA → Pool (scale) ───────────────────────────────── -->
  <line x1="571" y1="220" x2="571" y2="95" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="584" y="155" font-size="9.5" fill="#444444">scale</text>
  <text x="584" y="168" font-size="9.5" fill="#444444">replicas</text>

  <!-- Caption -->
  <text x="340" y="297" text-anchor="middle" font-size="10" fill="#888888">EPP queue depth and running requests drive demand-side scaling</text>
</svg>
