multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

modelArtifacts:
  uri: "hf://Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
  size: 700Gi
  name: Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "inference-scheduling"
    llm-d.ai/hardware-variant: "tpu"
    llm-d.ai/hardware-vendor: "google"
    llm-d.ai/model: Qwen3-Coder-480B-A35B-Instruct-FP8

routing:
  proxy:
    enabled: false # removes sidecar from deployment - no PD in inference scheduling
    targetPort: 8000 # controls vLLM port to matchup with sidecar if deployed

accelerator:
  type: "google"

serviceAccountOverride: "placeholder-sa"

decode:
  create: true
#  priorityClassName: nightly-gpu-critical
  parallelism:
    tensor: 8
  replicas: 2
  extraConfig:
    nodeSelector:
      cloud.google.com/gke-tpu-topology: "2x2x1"
      cloud.google.com/gke-tpu-accelerator: "tpu7x"
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm" # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: "vllm/vllm-tpu:nightly-20260401-a536749-8c0b626"
      env:
        - name: VLLM_XLA_CACHE_PATH
          value: <Insert GCS URI here> # e.g. gs://my-gcs-bucket/xla-cache
      modelCommand: custom
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --model=<Insert GCS URI here> # e.g. "gs://my-gcs-bucket/Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
        - --load-format=runai_streamer
        - --tensor_parallel_size=8
        - --data-parallel-size=1
        - --max-model-len=9216
        - --max-num-batched-tokens=1028
        - --max-num-seqs=128
        - --kv-cache-dtype=fp8
        - --async-scheduling
        - --gpu-memory-utilization=0.93
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          google.com/tpu: 4
        requests:
          google.com/tpu: 4
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}

prefill:
  create: false
