## llm-d router (EPP + gateway) overrides for the DISAGGREGATED (EG) Wan
## text-to-video model server on Intel XPU.
##
## Layer on top of: guides/recipes/router/base.values.yaml
##   helm ... -f guides/recipes/router/base.values.yaml \
##            -f guides/multimodal-serving/e-disaggregation/modelserver/xpu/vllm-omni/e-g/router.values.yaml
##
## Only the encode/master Pod exposes the HTTP API (/v1/videos); the headless
## generator Pod has no HTTP endpoint. So the InferencePool / EPP selects ONLY the
## encode Pods (label llm-d.ai/role pinned via modelServers.matchLabels below).
## The EPP load-balances across encode-master REPLICAS; the generator pool scales
## independently and is reached internally via the Omni master, NOT the gateway.
##
## Scoring profile is identical to the aggregated guide: video diffusion has no
## autoregressive KV cache / token-prefix reuse, so prefix-cache / kv-cache
## scorers are intentionally omitted. Scheduling is purely load-aware.

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  # We ship our own path-scoped HTTPRoute (httproute.yaml) matching /v1/videos.
  httpRoute:
    create: false

  epp:
    pluginsConfigFile: "wan-video-eg-xpu-plugins.yaml"
    pluginsCustomConfig:
      wan-video-eg-xpu-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: queue-scorer
        - type: active-request-scorer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: queue-scorer
            weight: 3
          - pluginRef: active-request-scorer
            weight: 2

  modelServers:
    matchLabels:
      llm-d.ai/guide: "multimodal-video"
      # Restrict to the encode/master Pods (the only ones serving HTTP). The
      # generator Pods do NOT carry llm-d.ai/guide, so they are excluded.
      llm-d.ai/role: "encode"
