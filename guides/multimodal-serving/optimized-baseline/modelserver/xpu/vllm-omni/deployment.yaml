apiVersion: apps/v1
kind: Deployment
metadata:
  name: video
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        fsGroup: 107
        supplementalGroups:
          - 107
      containers:
        # ---------------------------------------------------------------------
        # Aggregated Wan video worker: a single vLLM-Omni process that serves the
        # OpenAI-compatible HTTP API (/v1/videos) AND runs the full diffusion
        # pipeline (UMT5 + DiT + VAE) in one stage, pinned to one Intel XPU.
        #
        # This uses vLLM-Omni's OWN OpenAI server (`vllm serve <model> --omni`).
        # No Dynamo, no etcd, no NATS — the image already ships everything needed.
        # ---------------------------------------------------------------------
        - name: modelserver
          image: REPLACE_MODEL_SERVER_IMAGE
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              exec vllm serve "Wan-AI/Wan2.1-T2V-1.3B-Diffusers" --omni \
                --port 8000 \
                --enforce-eager
          ports:
            - name: http
              containerPort: 8000
          env:
            # Select the Intel XPU backend for both vLLM core and vLLM-Omni.
            - name: VLLM_TARGET_DEVICE
              value: "xpu"
            - name: VLLM_OMNI_TARGET_DEVICE
              value: "xpu"
            # DRA exposes only the allocated XPU to the container, so it is index 0.
            - name: ZE_AFFINITY_MASK
              value: "0"
            - name: TORCH_LLM_ALLREDUCE
              value: "1"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
            requests:
              cpu: "16"
              memory: 64Gi
            claims:
              - name: xpu-video-claim
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      resourceClaims:
        - name: xpu-video-claim
          resourceClaimTemplateName: xpu-video-claim
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: torch-compile-cache
          emptyDir: {}