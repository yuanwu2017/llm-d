## optimized-baseline guide overrides for the scheduler.
## Layer on top of: recipes/scheduler/base.values.yaml

inferenceExtension:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081
  pluginsConfigFile: "optimized-baseline-plugins.yaml"
  pluginsCustomConfig:
    optimized-baseline-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: queue-scorer
          weight: 2
        - pluginRef: kv-cache-utilization-scorer
          weight: 2
        - pluginRef: prefix-cache-scorer
          weight: 3

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/guide: "optimized-baseline"
