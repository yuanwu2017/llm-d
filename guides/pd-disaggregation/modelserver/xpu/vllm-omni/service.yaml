apiVersion: v1
kind: Service
metadata:
  name: video
spec:
  selector:
    # kustomize injects the shared label set (see kustomization.yaml) into both
    # the Deployment selector and this Service selector.
    llm-d.ai/engine-type: vllm-omni
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
