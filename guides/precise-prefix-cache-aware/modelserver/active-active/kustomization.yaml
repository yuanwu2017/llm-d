# Ready-to-apply overlay for active-active HA on NVIDIA GPU + vLLM.
# Pairs with scheduler/features/active-active.values.yaml.
#
# For other accelerators, copy this file and change `resources` to point at
# the chosen overlay (e.g. ../amd/vllm, ../hpu/vllm, ../tpu-v6/vllm, ...).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../gpu/vllm

components:
  - ../components/active-active
