apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Active-active high-availability modelserver overlay for the
# precise-prefix-cache-aware guide.
#
# Overrides the KV_EVENTS_ENDPOINT env var so vLLM PUBs bind per-pod
# (tcp://*:5556) and exposes the ZMQ port so every scheduler replica can
# dial each pod. Pair with scheduler/features/active-active.values.yaml
# on the scheduler side.
patches:
  - path: patch-vllm-kv-events.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: decode
