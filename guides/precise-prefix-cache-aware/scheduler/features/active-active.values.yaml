## Active-active high-availability overlay for the precise-prefix-cache-aware guide.
## Layer on top of: recipes/scheduler/base.values.yaml
##                  precise-prefix-cache-aware/scheduler/precise-prefix-cache-aware.values.yaml
##
## What this gives you
## ===================
## Two scheduler pods running active-active behind a single Kubernetes Service.
## Each replica pod contains the scheduler (EPP) *and* its Envoy gateway
## sidecar (the standalone chart bundles them), so replicas: 2 means
## 2 gateway+scheduler pairs. Client traffic to svc/<release>-epp is
## load-balanced across both; if a replica dies, the Service routes entirely
## to the survivor — no manual failover, no leader election gap.
##
## Why this needs the per-pod KV-events wiring
## ===========================================
## Each scheduler replica has its own in-memory prefix-cache index. To
## populate every replica's index identically, every vLLM pod must publish
## its KV events on its own socket (tcp://*:5556) and every scheduler
## replica must independently subscribe to every pod. That is the job of
## the data-layer endpoint-notification-source + scorer's EndpointExtractor
## (llm-d/llm-d-inference-scheduler#862):
##   - discoverPods: true + podDiscoveryConfig.socketPort: 5556
##   - endpoint-notification-source feeds add/delete events into the scorer
##   - the scorer's ExtractEndpoint creates/removes a ZMQ subscriber per pod
##
## On the modelserver side, pair this with the
## modelserver/components/active-active/ kustomize component so vLLM
## publishes per-pod (tcp://*:5556) instead of dialing the central EPP svc.
##
## Why leader election is disabled
## ===============================
## The chart auto-adds --ha-enable-leader-election when replicas > 1. With
## that flag the EPP readiness probe only passes on the leader — so the
## Service routes traffic only to the leader. That's active-passive HA, not
## active-active. Overriding ha-enable-leader-election=false here makes both
## replicas pass readiness so both actively serve traffic.

inferenceExtension:
  replicas: 2

  flags:
    # Override the chart's auto-added `--ha-enable-leader-election` (added
    # whenever replicas > 1). Without this override only the elected leader's
    # readiness probe passes, collapsing the deployment to active-passive.
    #
    # Workaround: the chart template renders each `flags` entry as two
    # separate args (`--key` and `"value"`), which pflag does NOT interpret
    # as `--key=value` for booleans. Embedding the `=false` into the key
    # forces the desired `--ha-enable-leader-election=false` single-arg
    # form; the empty value becomes a benign positional arg that the EPP
    # ignores. pflag honors last-occurrence wins, so this comes after the
    # chart's bare flag and sets leader-election to false.
    ha-enable-leader-election=false: ""

  pluginsCustomConfig:
    precise-prefix-cache-aware-plugins.yaml: |
      # Pod-discovery mode (required for active-active).
      #
      # kvEventsConfig.discoverPods=true activates per-pod subscriber mgmt.
      # endpoint-notification-source feeds endpoint add/delete events into
      # the scorer via ExtractEndpoint; the first invocation turns off the
      # legacy in-Score discovery path so the data layer is the sole
      # authority over per-pod ZMQ subscriber lifecycle.
      #
      # zmqEndpoint is intentionally unset — each pod is dialed directly
      # at tcp://<pod-ip>:<podDiscoveryConfig.socketPort>.
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
        - type: tokenizer
          parameters:
            modelName: Qwen/Qwen3-32B
            udsTokenizerConfig:
              socketFile: /tmp/tokenizer/tokenizer-uds.socket
        - type: endpoint-notification-source
        - type: metrics-data-source
        - type: core-metrics-extractor
        - type: single-profile-handler
        - type: decode-filter
        - type: precise-prefix-cache-scorer
          parameters:
            tokenProcessorConfig:
              blockSize: 64
              hashSeed: "42"
            indexerConfig:
              tokenizersPoolConfig:
                modelName: Qwen/Qwen3-32B
                uds:
                  socketFile: /tmp/tokenizer/tokenizer-uds.socket
              kvBlockIndexConfig:
                enableMetrics: true
            kvEventsConfig:
              topicFilter: "kv@"
              concurrency: 4
              discoverPods: true
              podDiscoveryConfig:
                socketPort: 5556
        - type: kv-cache-utilization-scorer
        - type: queue-scorer
        - type: max-score-picker
      dataLayer:
        sources:
          - pluginRef: metrics-data-source
            extractors:
              - pluginRef: core-metrics-extractor
          - pluginRef: endpoint-notification-source
            extractors:
              - pluginRef: precise-prefix-cache-scorer
      schedulingProfiles:
        - name: default
          plugins:
            - pluginRef: decode-filter
            - pluginRef: tokenizer
            - pluginRef: precise-prefix-cache-scorer
              weight: 2.0
            - pluginRef: kv-cache-utilization-scorer
              weight: 1.0
            - pluginRef: queue-scorer
              weight: 1.0
            - pluginRef: max-score-picker
