apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: decode
  labels:
    llm-d.ai/role: decode
spec:
  leaderWorkerTemplate:
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/role: decode
      spec:
        serviceAccountName: sa
        containers:
          - name: modelserver
            image: REPLACE_MODEL_SERVER_IMAGE
            command: []
            args: []
            env: []
            ports:
              - name: modelserver
                containerPort: 8000
                protocol: TCP
            livenessProbe:
              httpGet:
                path: /health
                port: modelserver
            readinessProbe:
              httpGet:
                path: /v1/models
                port: modelserver
            startupProbe:
              httpGet:
                path: /v1/models
                port: modelserver
