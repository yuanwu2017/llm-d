apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: decode
spec:
  leaderWorkerTemplate:
    workerTemplate:
      spec:
        initContainers:
          - name: routing-proxy
            args:
              - --port=8000
              - --vllm-port=8200
              - --connector=nixlv2
              - --zap-log-level=1
              - --secure-proxy=false
              - --enable-prefiller-sampling
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
            imagePullPolicy: Always
            ports:
              - containerPort: 8000
                name: sidecar
                protocol: TCP
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
            restartPolicy: Always
