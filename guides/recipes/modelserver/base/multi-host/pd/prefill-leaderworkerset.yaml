apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: prefill
  labels:
    llm-d.ai/role: prefill
spec:
  leaderWorkerTemplate:
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/role: prefill
      spec:
        serviceAccountName: sa
        containers:
          - name: modelserver
            image: REPLACE_MODEL_SERVER_IMAGE
            command: []
            args: []
            env: []
            ports:
              - name: modelserver
                containerPort: 8000
                protocol: TCP
              - name: nixl
                containerPort: 5600
                protocol: TCP
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            livenessProbe:
              httpGet:
                path: /health
                port: modelserver
            readinessProbe:
              httpGet:
                path: /v1/models
                port: modelserver
            startupProbe:
              httpGet:
                path: /v1/models
                port: modelserver