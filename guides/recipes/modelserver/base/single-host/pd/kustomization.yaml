apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../default
  - prefill-deployment.yaml

configurations:
  - namereference.yaml

patches:
  # Add routing sidecar to the decode deployment
  - path: patch-decode-deployment.yaml
    target:
      kind: Deployment
      name: decode
  # Change decode modelserver port to 8200
  - target:
      kind: Deployment
      name: decode
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 8200
  - target:
      kind: Deployment
      name: decode
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/ports/-
        value:
          name: nixl
          containerPort: 5600
          protocol: TCP