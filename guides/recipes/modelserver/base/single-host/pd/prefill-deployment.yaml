apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefill
  labels:
    llm-d.ai/role: prefill
spec:
  selector:
    matchLabels:
      llm-d.ai/role: prefill
  template:
    metadata:
      labels:
        llm-d.ai/role: prefill
    spec:
      serviceAccountName: sa
      containers:
        - name: modelserver
          image: REPLACE_MODEL_SERVER_IMAGE
          command: []
          args: []
          env: []
          ports:
            - name: modelserver
              containerPort: 8000
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
