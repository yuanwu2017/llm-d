apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-optimized-baseline-llm-d-modelservice-decode
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-optimized-baseline-llm-d-modelservice-decode
  minReplicas: 1
  maxReplicas: 16
  metrics:
    - type: External
      external:
        metric:
          name: wva_desired_replicas
          selector:
            matchLabels:
              variant_name: optimized-baseline-autoscaler
        target:
          type: AverageValue
          averageValue: "1"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
